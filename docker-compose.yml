  # PHP
  php:
    networks:
      - network
    container_name: php
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
      # - /c/Users/Ib0n35/Documents/2025/PROJETOS_DOCKER/TESTE/uploads:/var/www/uploads
      #- /home/adminsyst/SGPSS/uploads:/var/www/uploads

  # Nginx
  nginx:
    networks:
      - network
    container_name: nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "8084:80"
      - "4443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

